function AnalyticsPage({data}) {
  const {analytics:an, recordings, reviews, users} = data;
  const logins = an?.logins||[];
  const activities = an?.activities||[];
  const sessions = an?.sessions||[];
  const pv = an?.pageViews||{};
  const uniqueUsers = [...new Set(logins.map(l=>l.user))].length;
  const avgDur = sessions.length ? Math.round(sessions.reduce((a,s)=>a+(s.dur||0),0)/sessions.length) : 0;
  const totalTime = sessions.reduce((a,s)=>a+(s.dur||0),0);
  const fmtDur = (s) => { if (s<60) return s+"s"; if (s<3600) return Math.floor(s/60)+"m "+s%60+"s"; return Math.floor(s/3600)+"h "+Math.floor((s%3600)/60)+"m"; };

  return (<div style={{animation:"fadeIn .4s"}}>
    <h1 style={{fontWeight:900,fontSize:26,color:"#1b7a1b",marginBottom:16}}>📊 Analytics</h1>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:12,marginBottom:18}}>
      {[{i:"🔑",v:logins.length,l:"Total Logins"},{i:"👥",v:uniqueUsers,l:"Unique Users"},{i:"📄",v:activities.length,l:"Actions"},{i:"⏱️",v:fmtDur(avgDur),l:"Avg Session"},{i:"⏳",v:fmtDur(totalTime),l:"Total Time"},{i:"🎙️",v:recordings.length,l:"Recordings"},{i:"⭐",v:reviews.length,l:"Reviews"},{i:"👤",v:users.length,l:"Users"}].map((m,i) =>
        <div key={i} style={{background:"#fff",borderRadius:14,padding:14,textAlign:"center",boxShadow:"0 2px 12px rgba(30,120,30,.08)"}}><div style={{fontSize:22,marginBottom:4}}>{m.i}</div><div style={{fontWeight:900,fontSize:22,color:"#1b7a1b"}}>{m.v}</div><div style={{fontSize:10,color:"#6b7280",fontWeight:600}}>{m.l}</div></div>)}
    </div>
    <Card title="📋 Recent Activity">
      <div style={{maxHeight:400,overflowY:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
          <thead><tr style={{background:"#f0faf0",position:"sticky",top:0}}><th style={{padding:6,textAlign:"left"}}>Time</th><th style={{padding:6}}>Type</th><th style={{padding:6}}>User</th><th style={{padding:6}}>Detail</th></tr></thead>
          <tbody>
            {activities.slice(-50).reverse().map((a,i) => <tr key={i} style={{borderBottom:"1px solid #f8f8f8"}}>
              <td style={{padding:6,fontSize:10,color:"#999"}}>{a.date}</td>
              <td style={{padding:6,fontWeight:700,fontSize:10}}>{a.type}</td>
              <td style={{padding:6}}>{a.user}</td>
              <td style={{padding:6,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{a.detail}</td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </Card>
  </div>);
}

// ===== FEEDBACK PAGE (admin) =====
function FeedbackPage({data, saveKey, user, showToast}) {
  const feedback = data.feedback || [];
  const recordings = data.recordings || [];
  const isAdmin = user.role === "admin";
  const [editId, setEditId] = useState(null);
  const [editText, setEditText] = useState("");

  const saveFB = async (recId) => {
    const updated = feedback.map(f => f.recId === recId ? {...f, adminNotes: editText, editedBy: user.u, editedAt: new Date().toLocaleString()} : f);
    if (!updated.find(f => f.recId === recId)) {
      updated.push({recId, adminNotes: editText, editedBy: user.u, editedAt: new Date().toLocaleString()});
    }
    await saveKey("feedback", updated);
    setEditId(null);
    showToast("Feedback saved! 💬");
  };

  return (<div style={{animation:"popIn .4s ease"}}>
    <h1 style={{fontWeight:900,fontSize:24,color:"#1b7a1b",marginBottom:14}}>💬 AI Feedback & Evaluations</h1>
    {recordings.length === 0 && <Card><p style={{textAlign:"center",color:"#999",padding:20}}>No recordings yet.</p></Card>}
    {recordings.map(rec => {
      const fb = rec.feedback;
      const adminFB = feedback.find(f => f.recId === rec.id);
      return <Card key={rec.id} bg="linear-gradient(135deg,#fafff5,#f0faf0)" border="#6fcf6f">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div><strong>{rec.speaker || "Untagged"}</strong> — {rec.title}<br/><span style={{fontSize:11,color:"#888"}}>{rec.type} · {rec.date}</span></div>
        </div>
        {fb && <>
          <div style={{padding:10,background:"#fff",borderRadius:10,marginBottom:6,fontSize:13}}>{fb.enc}</div>
          {[fb.voice,fb.gesture,fb.structure].filter(Boolean).map((f,i) =>
            <div key={i} style={{padding:8,background:"#fff",borderRadius:8,marginBottom:4,fontSize:12}}>
              <strong>{f.cat}:</strong> {f.tip}
            </div>
          )}
        </>}
        {adminFB?.adminNotes && <div style={{padding:10,background:"#fef3c7",borderRadius:10,marginTop:6,fontSize:12}}>
          <strong>👉 Admin Notes:</strong> {adminFB.adminNotes}
        </div>}
        {isAdmin && editId !== rec.id && <Btn onClick={()=>{setEditId(rec.id);setEditText(adminFB?.adminNotes||"");}} color="#6b7280" style={{fontSize:11,marginTop:6}}>📝 Edit</Btn>}
        {isAdmin && editId === rec.id && <div style={{marginTop:8}}>
          <Txt value={editText} onChange={e=>setEditText(e.target.value)} placeholder="Admin notes..." />
          <Btn onClick={()=>saveFB(rec.id)} style={{fontSize:11}}>💾 Save</Btn>
          <Btn onClick={()=>setEditId(null)} color="#999" style={{fontSize:11,marginLeft:6}}>Cancel</Btn>
        </div>}
      </Card>;
    })}
  </div>);
}

// ===== MEETINGS PAGE =====
function MeetingsPage({data, saveKey, user, showToast, track}) {
  const meetings = data.meetings || [];
  const isAdmin = user.role === "admin";
  const [form, setForm] = useState({date:"",time:"",location:"",participants:"",notes:"",summary:"",week:"",recordingLink:""});
  const [showAdd, setShowAdd] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [expanded, setExpanded] = useState({});

  const toggleExpand = (id) => setExpanded(prev => ({...prev, [id]: !prev[id]}));

  const addMeeting = async () => {
    if (!form.date) { showToast("Date required!","err"); return; }
    const m = {...form, id: Date.now().toString(36), createdBy: user.u, createdAt: new Date().toLocaleString()};
    const updated = editIdx !== null ? meetings.map((mt,i)=>i===editIdx?{...mt,...form}:mt) : [m,...meetings];
    await saveKey("meetings", updated);
    setForm({date:"",time:"",location:"",participants:"",notes:"",summary:"",week:"",recordingLink:""});
    setShowAdd(false); setEditIdx(null);
    showToast(editIdx!==null?"Meeting updated!":"Meeting added! 📅");
    track("meeting", form.date);
  };

  return (<div style={{animation:"popIn .4s ease"}}>
    <h1 style={{fontWeight:900,fontSize:24,color:"#1b7a1b",marginBottom:14}}>📅 Meetings</h1>
    {isAdmin && !showAdd && <Btn onClick={()=>{setShowAdd(true);setEditIdx(null);}} style={{marginBottom:14}}>➕ Add Meeting</Btn>}
    {showAdd && isAdmin && <Card title={editIdx!==null?"✍️ Edit":"➕ New Meeting"} bg="#fafff5" border="#6fcf6f">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Inp type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
        <Inp type="time" value={form.time} onChange={e=>setForm({...form,time:e.target.value})} />
      </div>
      <Inp value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Location" />
      <Inp value={form.week} onChange={e=>setForm({...form,week:e.target.value})} placeholder="Week/Topic" />
      <Inp value={form.participants} onChange={e=>setForm({...form,participants:e.target.value})} placeholder="Participants (comma separated)" />
      <Inp value={form.recordingLink} onChange={e=>setForm({...form,recordingLink:e.target.value})} placeholder="Recording link" />
      <Txt value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Meeting notes" />
      <Txt value={form.summary} onChange={e=>setForm({...form,summary:e.target.value})} placeholder="Summary / Minutes" />
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={addMeeting}>💾 Save</Btn>
        <Btn onClick={()=>{setShowAdd(false);setEditIdx(null);}} color="#999">Cancel</Btn>
      </div>
    </Card>}
    {meetings.length === 0 && !showAdd && <Card><p style={{textAlign:"center",color:"#999",padding:20}}>No meetings yet.</p></Card>}
    {meetings.map((m,i) => {
      const key = m.id || i;
      const isOpen = !!expanded[key];
      return (<Card key={key} border="#d1fae5">
        <div onClick={()=>toggleExpand(key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
          <div>
            <div style={{fontWeight:800,fontSize:15}}>📅 {m.date} {m.time && "• "+m.time}</div>
            {m.week && <div style={{fontSize:11,fontWeight:700,color:"#3da33d"}}>{m.week}</div>}
          </div>
          <span style={{transform:isOpen?"rotate(90deg)":"rotate(0)",transition:".2s"}}>▶</span>
        </div>
        {isOpen && <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #e5e7eb"}}>
          {m.location && <div style={{fontSize:12,marginBottom:4}}>🗺️ {m.location}</div>}
          {m.participants && <div style={{fontSize:12,marginBottom:6}}>👥 {m.participants}</div>}
          {m.recordingLink && <div style={{fontSize:12,marginBottom:6}}>📹 <a href={m.recordingLink} target="_blank" rel="noreferrer">Recording</a></div>}
          {m.notes && <div style={{padding:8,background:"#f9fafb",borderRadius:8,fontSize:12,marginBottom:4,whiteSpace:"pre-wrap"}}><strong>Notes:</strong> {m.notes}</div>}
          {m.summary && <div style={{padding:8,background:"#fef3c7",borderRadius:8,fontSize:12,whiteSpace:"pre-wrap"}}><strong>Summary:</strong> {m.summary}</div>}
          {isAdmin && <Btn onClick={()=>{setForm(m);setShowAdd(true);setEditIdx(i);}} color="#6b7280" style={{fontSize:10,marginTop:8}}>✍️ Edit</Btn>}
        </div>}
      </Card>);
    })}
  </div>);
}

// ===== BRAGBOARD PAGE =====
function BragBoardPage({data, saveKey, user, showToast, track, setData}) {
  const bragboard = data.bragboard || [];
  const members = data.members || [];
  const isAdmin = user.role === "admin";
  const [form, setForm] = useState({speaker:"",activity:"",text:"",photo:"",photoOriginalKB:0,photoCompressedKB:0});
  const [dragOver, setDragOver] = useState(false);
  const [commentForm, setCommentForm] = useState({});
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef(null);

  const EMOJI_LIST = ["👏","😍","😂","🔥","🌟","🤩","💪","🎉","❤️","🙌"];

  // Update a single post in both Firebase and local state
  const upsertPost = async (post) => {
    await S.bragSetPost(post);
    setData(prev => {
      const arr = prev.bragboard || [];
      const idx = arr.findIndex(p => p.id === post.id);
      const next = idx >= 0 ? arr.map(p => p.id === post.id ? post : p) : [post, ...arr];
      next.sort((a,b) => (b.ts||0) - (a.ts||0));
      return {...prev, bragboard: next};
    });
  };

  const removePost = async (postId) => {
    await S.bragDeletePost(postId);
    setData(prev => ({...prev, bragboard: (prev.bragboard||[]).filter(p => p.id !== postId)}));
  };

  // Iteratively compress images to keep Firebase payload small
  const compressImage = (file, targetKB = 40) => {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const render = (maxDim, quality) => {
            let {width, height} = img;
            if (width > maxDim || height > maxDim) {
              if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
              else { width = Math.round(width * maxDim / height); height = maxDim; }
            }
            const canvas = document.createElement("canvas");
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);
            return canvas.toDataURL("image/jpeg", quality);
          };
          const attempts = [
            {dim: 800, q: 0.6},{dim: 800, q: 0.5},{dim: 700, q: 0.5},
            {dim: 640, q: 0.45},{dim: 560, q: 0.4},{dim: 480, q: 0.4},{dim: 480, q: 0.35},
          ];
          let dataUrl = "";
          for (const {dim, q} of attempts) {
            dataUrl = render(dim, q);
            const kb = (dataUrl.length * 0.75) / 1024;
            if (kb <= targetKB) break;
          }
          resolve(dataUrl);
        };
        img.onerror = reject;
        img.src = ev.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  };

  const handleFile = async (files) => {
    if (!files || !files[0]) return;
    const file = files[0];
    if (!file.type.startsWith("image/")) { showToast("Please upload an image!","err"); return; }
    if (file.size > 10*1024*1024) { showToast("Max 10MB!","err"); return; }
    setUploading(true);
    try {
      const originalKB = Math.round(file.size / 1024);
      const compressed = await compressImage(file);
      const compressedKB = Math.round(compressed.length * 0.75 / 1024);
      setForm(f => ({...f, photo: compressed, photoOriginalKB: originalKB, photoCompressedKB: compressedKB}));
      showToast(`Photo: ${originalKB}KB → ${compressedKB}KB 📸`);
    } catch (e) {
      showToast("Couldn't process image","err");
    } finally {
      setUploading(false);
    }
  };

  const submit = async () => {
    if (!form.speaker) { showToast("Who's sharing this?","err"); return; }
    if (!form.text && !form.photo) { showToast("Add text or a photo!","err"); return; }
    const post = {
      id: Date.now().toString(36)+Math.random().toString(36).substr(2,4),
      speaker: form.speaker, activity: form.activity, text: form.text,
      photo: form.photo || "",
      photoOriginalKB: form.photoOriginalKB || 0,
      photoCompressedKB: form.photoCompressedKB || 0,
      date: new Date().toLocaleString(), ts: Date.now(),
      by: user.display || user.u,
      comments: [], reactions: {}
    };
    await upsertPost(post);
    track("bragpost", form.speaker);
    setForm({speaker:"",activity:"",text:"",photo:"",photoOriginalKB:0,photoCompressedKB:0});
    showToast("Joy added! 🌿✨");
  };

  const addComment = async (postId) => {
    const text = (commentForm[postId]||"").trim();
    if (!text) return;
    const post = bragboard.find(b => b.id === postId);
    if (!post) return;
    const updatedPost = {
      ...post,
      comments: [...(post.comments||[]), {by:user.display||user.u, text, ts:Date.now(), date:new Date().toLocaleString()}]
    };
    await upsertPost(updatedPost);
    setCommentForm({...commentForm, [postId]: ""});
    showToast("Comment added!");
  };

  const addReaction = async (postId, emoji) => {
    const post = bragboard.find(b => b.id === postId);
    if (!post) return;
    const reactions = {...(post.reactions||{})};
    reactions[emoji] = (reactions[emoji]||0) + 1;
    await upsertPost({...post, reactions});
  };

  const deletePost = async (postId) => {
    if (!window.confirm("Delete this joyful moment?")) return;
    await removePost(postId);
    showToast("Deleted!");
  };

  return (<div style={{animation:"popIn .4s ease"}}>
    <h1 style={{fontWeight:900,fontSize:26,color:"#1b7a1b",marginBottom:4}}>🌟 🌿 Jar of Joys 🌿 🌟</h1>
    <p style={{fontSize:14,color:"#6b7280",marginBottom:16,fontWeight:600}}>Show off your awesome moments!</p>

    <Card title="Post a Joyful Moment!" bg="linear-gradient(135deg,#fffbeb,#fef9c3)" border="#fbbf24">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <Sel value={form.speaker} onChange={e=>setForm({...form,speaker:e.target.value})}>
          <option value="">-- Who's sharing? --</option>
          {members.map(m=><option key={m.name} value={m.name}>{m.emoji} {m.name}</option>)}
        </Sel>
        <Inp value={form.activity} onChange={e=>setForm({...form,activity:e.target.value})} placeholder="Activity" />
      </div>
      <Txt value={form.text} onChange={e=>setForm({...form,text:e.target.value})} placeholder="Tell everyone what happened!" />
      <div
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files);}}
        onClick={()=>!uploading && fileRef.current?.click()}
        style={{border:dragOver?"3px dashed #3da33d":"3px dashed #d1fae5",borderRadius:12,padding:form.photo?8:24,textAlign:"center",cursor:uploading?"wait":"pointer",background:dragOver?"#d1fae5":"#fff",marginBottom:10}}>
        {uploading ? <div style={{fontSize:13,fontWeight:700,color:"#3da33d"}}>⏳ Compressing...</div>
         : form.photo ? <div style={{position:"relative"}}>
            <img src={form.photo} alt="Preview" style={{maxWidth:"100%",maxHeight:240,borderRadius:10}} />
            <button onClick={e=>{e.stopPropagation();setForm({...form,photo:"",photoOriginalKB:0,photoCompressedKB:0});}} style={{position:"absolute",top:4,right:4,background:"#ef4444",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer"}}>×</button>
          </div>
         : <div>
            <div style={{fontSize:13,fontWeight:700,color:"#6b7280"}}>Click or drag & drop a photo!</div>
            <div style={{fontSize:11,color:"#999"}}>Max 10MB, auto-compressed</div>
          </div>}
        <input ref={fileRef} type="file" accept="image/*" onChange={e=>handleFile(e.target.files)} style={{display:"none"}} />
      </div>
      <Btn onClick={submit} color="linear-gradient(135deg,#f59e0b,#d97706)" disabled={uploading}>Yippee! Post it!</Btn>
    </Card>

    {bragboard.length === 0 && <Card><p style={{textAlign:"center",color:"#bbb",padding:30}}>No posts yet!</p></Card>}

    {bragboard.map(post => {
      const m = members.find(x=>x.name===post.speaker);
      return <Card key={post.id} bg="linear-gradient(135deg,#fff,#fafff5)" border={m?.color||"#6fcf6f"}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:40,height:40,borderRadius:"50%",background:m?.color||"#3da33d",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#fff"}}>{m?.emoji||"😎"}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:15}}>{post.speaker} <span style={{fontSize:11,color:"#999",fontWeight:500}}>shared about</span> <span style={{color:"#d97706"}}>{post.activity||"something awesome"}</span></div>
            <div style={{fontSize:10,color:"#999"}}>{post.date} · by {post.by}</div>
          </div>
          {isAdmin && <Btn onClick={()=>deletePost(post.id)} color="#ef4444" style={{padding:"4px 8px",fontSize:10}}>Delete</Btn>}
        </div>
        {post.text && <p style={{fontSize:14,lineHeight:1.7,marginBottom:10,padding:10,background:"#fafafa",borderRadius:10}}>{post.text}</p>}
        {post.photo && <img src={post.photo} alt="Joy" style={{maxWidth:"100%",maxHeight:"min(70vh,600px)",objectFit:"contain",margin:"0 auto 10px",borderRadius:12,display:"block"}} />}
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
          {EMOJI_LIST.map(em => {
            const count = (post.reactions||{})[em] || 0;
            return <button key={em} onClick={()=>addReaction(post.id,em)} style={{padding:"4px 8px",borderRadius:20,border:count?"2px solid #fbbf24":"2px solid #e5e7eb",background:count?"#fef3c7":"#fff",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
              {em} {count>0 && <span style={{fontSize:10,fontWeight:700,color:"#d97706"}}>{count}</span>}
            </button>;
          })}
        </div>
        {(post.comments||[]).length > 0 && <div style={{marginBottom:8}}>
          {(post.comments||[]).map((c,ci) => <div key={ci} style={{padding:"6px 10px",background:"#f0faf0",borderRadius:8,marginBottom:4,fontSize:12}}>
            <strong>{c.by}:</strong> {c.text}
          </div>)}
        </div>}
        <div style={{display:"flex",gap:6}}>
          <Inp value={commentForm[post.id]||""} onChange={e=>setCommentForm({...commentForm,[post.id]:e.target.value})} placeholder="Add a comment..." onKeyDown={e=>e.key==="Enter"&&addComment(post.id)} style={{flex:1,marginBottom:0}} />
          <Btn onClick={()=>addComment(post.id)} style={{padding:"8px 14px",fontSize:12}}>Post</Btn>
        </div>
      </Card>;
    })}
  </div>);
}
