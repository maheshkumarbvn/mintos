/* =====================================================================
   MinTos Club — Mini Toastmasters LMS
   =====================================================================
   FIXES IN THIS VERSION:
   ---------------------------------------------------------------------
   1. MAIN BUG: Parents linked to MULTIPLE kids could not see reviews,
      appreciations, or give feedback for all their kids. Root cause:
      `user.linkedKid` can be either a STRING ("Advitha") or an ARRAY
      (["Gupti","Poshya"]), and several places did strict string equality
      checks. Introduced a `linkedKidsOf()` helper that ALWAYS returns
      a normalized array of kid names, and rewrote filter/permission
      checks to use `.includes()`.
   2. ReviewsPage:
		Submission restricted to parents + admin (kids cannot submit).
		Parents can now review any kid, not just their linked ones (reviewableMembers = data.members).
		Visibility filter for parents: rv.byUser === user.u (reviews I wrote) OR myLinkedKids.includes(rv.kid) (reviews my kids got).
		Kids see every review about themselves. getReviewBy returns "A Reviewer 👀" for kids regardless of who wrote it — full anonymity.
		Admin gets a full inline edit form (feedback, appreciation, task, star ratings) and delete button. Removed the old visibility-toggle UI since the rules are now role-based, not manually masked.
		The old config.reviewVisibility masking logic is gone — it was a workaround for the previous over-permissive sharing and is no longer needed.
   3. AppreciationPage:
		Dropdown now uses data.users (filtered to active) — everyone can appreciate everyone, including admin and parents.
		Stores who as username (stable identifier) plus whoDisplay snapshot; the resolveUser helper handles backwards compatibility with old records that stored display names.
		Appreciations remain fully public — all users see all appreciations.
		Admin gets inline edit and delete buttons on every appreciation card.
   4. AdminPage: when creating a parent with a single linked kid via the
      multi-select, the code still stored it as a single-element array,
      which is consistent and now fully supported everywhere.
   5. Added defensive normalization so OLD data with string linkedKid
      still works (backwards compatible).
   ===================================================================== */

const { useState, useEffect, useRef, useCallback } = React;

// ---------------------------------------------------------------------
// linkedKidsOf — the canonical helper for resolving a user's linked kids.
// Always returns an ARRAY of kid display names. Handles:
//   - undefined/null  -> []
//   - string "Advitha" -> ["Advitha"]
//   - array ["Gupti","Poshya"] -> ["Gupti","Poshya"]
// Use this EVERYWHERE instead of touching user.linkedKid directly.
// ---------------------------------------------------------------------
function linkedKidsOf(user) {
  if (!user || !user.linkedKid) return [];
  if (Array.isArray(user.linkedKid)) return user.linkedKid.filter(Boolean);
  return [user.linkedKid];
}

        const snap = await fbDb.ref("mintos/"+k).once("value");
        if (snap.exists()) { const v=snap.val(); localStorage.setItem("mts_s_"+k,JSON.stringify(v)); return v; }
      } catch(e) {}
    }
    try { const r=localStorage.getItem("mts_s_"+k); return r?JSON.parse(r):null; } catch(e) { return null; }
  },
  async set(k,v) {
    try { localStorage.setItem("mts_s_"+k,JSON.stringify(v)); } catch(e) {}
    if (fbReady) { try { await fbDb.ref("mintos/"+k).set(v); } catch(e) {} }
    return true;
  },
  // Bragboard per-post operations (stored under mintos/mts_bragboard/{postId})
  async bragGetAll() {
    if (fbReady) {
      try {
        const snap = await fbDb.ref("mintos/mts_bragboard").once("value");
        if (snap.exists()) {
          const obj = snap.val() || {};
          const arr = Object.values(obj).sort((a,b) => (b.ts||0) - (a.ts||0));
          localStorage.setItem("mts_s_mts_bragboard", JSON.stringify(arr));
          return arr;
        }
      } catch(e) {}
    }
    try { const r = localStorage.getItem("mts_s_mts_bragboard"); return r ? JSON.parse(r) : []; } catch(e) { return []; }
  },
  async bragSetPost(post) {
    try {
      const r = localStorage.getItem("mts_s_mts_bragboard");
      const arr = r ? JSON.parse(r) : [];
      const idx = arr.findIndex(p => p.id === post.id);
      if (idx >= 0) arr[idx] = post; else arr.unshift(post);
      arr.sort((a,b) => (b.ts||0) - (a.ts||0));
      localStorage.setItem("mts_s_mts_bragboard", JSON.stringify(arr));
    } catch(e) {}
    if (fbReady) { try { await fbDb.ref("mintos/mts_bragboard/"+post.id).set(post); } catch(e) {} }
    return true;
  },
  async bragDeletePost(postId) {
    try {
      const r = localStorage.getItem("mts_s_mts_bragboard");
      const arr = r ? JSON.parse(r) : [];
      const filtered = arr.filter(p => p.id !== postId);
      localStorage.setItem("mts_s_mts_bragboard", JSON.stringify(filtered));
    } catch(e) {}
    if (fbReady) { try { await fbDb.ref("mintos/mts_bragboard/"+postId).remove(); } catch(e) {} }
    return true;
  },
  async mergeAnalytics(fn) {
    let an=null;
    if (fbReady) { try { const snap=await fbDb.ref("mintos/mts_analytics").once("value"); if(snap.exists()) an=snap.val(); } catch(e) {} }
    if (!an) { try { const r=localStorage.getItem("mts_s_mts_analytics"); if(r) an=JSON.parse(r); } catch(e) {} }
    if (!an) an={logins:[],activities:[],pageViews:{},sessions:[]};
    an=fn(an);
    if (an.activities&&an.activities.length>800) an.activities=an.activities.slice(-800);
    if (an.sessions&&an.sessions.length>300) an.sessions=an.sessions.slice(-300);
    if (an.logins&&an.logins.length>500) an.logins=an.logins.slice(-500);
    try { localStorage.setItem("mts_s_mts_analytics",JSON.stringify(an)); } catch(e) {}
    if (fbReady) { try { await fbDb.ref("mintos/mts_analytics").set(an); } catch(e) {} }
    return an;
  },
  async del(k) {
    try { localStorage.removeItem("mts_s_"+k); } catch(e) {}
    if (fbReady) { try { await fbDb.ref("mintos/"+k).remove(); } catch(e) {} }
    return true;
  }
};

  const [loginForm, setLoginForm] = useState({u:"",p:""});

  const showToast = useCallback((msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3000); },[]);

  // Load data on mount
  useEffect(()=>{
    (async()=>{
      const keys=["users","members","tasks","agenda","resources","appreciations","recordings","reviews","analytics","config","meetings","feedback","photos","passwordHistory","bragboard"];
      const defaults={users:DEF_USERS,members:DEF_MEMBERS,tasks:DEF_TASKS,agenda:DEF_AGENDA,resources:DEF_RESOURCES,appreciations:[],recordings:[],reviews:[],analytics:{logins:[],activities:[],pageViews:{},sessions:[]},config:DEF_CONFIG,meetings:DEF_MEETINGS,feedback:DEF_FEEDBACK,photos:{},passwordHistory:[],bragboard:[]};
      const loaded={};
      for(const k of keys){let val=await S.get("mts_"+k);if(!val){val=defaults[k];await S.set("mts_"+k,val);}loaded[k]=val;}
      setData(loaded);
      setLoading(false);
    })();
  },[]);

  // Save session on unload
  useEffect(()=>{
    const h=()=>{
      if(user){const dur=Math.round((Date.now()-sessionRef.current.start)/1000);
      try{const raw=localStorage.getItem("mts_s_mts_analytics");const an=raw?JSON.parse(raw):{logins:[],activities:[],pageViews:{},sessions:[]};
      an.sessions=[...(an.sessions||[]),{user:user.u,role:user.role,dur,pages:sessionRef.current.pages.length,flow:[...sessionRef.current.pages],ts:Date.now(),device:DEVICE_ID,loginTime:loginTimeRef.current,logoutTime:new Date().toLocaleString(),timeSpent:dur+"s"}];
      if(an.sessions.length>300)an.sessions=an.sessions.slice(-300);localStorage.setItem("mts_s_mts_analytics",JSON.stringify(an));}catch(e){}}
    };
    window.addEventListener("beforeunload",h);return()=>window.removeEventListener("beforeunload",h);
  },[user]);

  // Periodic Firebase refresh
  useEffect(()=>{
    if(!fbReady)return;
    const iv=setInterval(async()=>{try{
      // Bragboard per-post
      try {
        const snap = await fbDb.ref("mintos/mts_bragboard").once("value");
        const obj = snap.exists() ? (snap.val() || {}) : {};
        const arr = Object.values(obj).sort((a,b) => (b.ts||0) - (a.ts||0));
        setData(p => {
          if (JSON.stringify(p.bragboard) !== JSON.stringify(arr)) return {...p, bragboard: arr};
          return p;
        });
      } catch(e) {}
      // Other keys
      for(const k of["reviews","appreciations","recordings","analytics","meetings","feedback","photos","passwordHistory","users"]){
        const snap=await fbDb.ref("mintos/mts_"+k).once("value");
        if(snap.exists()){const val=snap.val();setData(p=>{if(JSON.stringify(p[k])!==JSON.stringify(val))return{...p,[k]:val};return p;});}
      }
    }catch(e){}},30000);
    return()=>clearInterval(iv);
  },[]);

  const saveKey=async(key,val)=>{await S.set("mts_"+key,val);setData(p=>({...p,[key]:val}));};

      return an;
    });
    setData(p=>({...p,analytics:newAn}));
  };

    const u=loginForm.u.trim().toLowerCase(),p=loginForm.p;
    const found=data.users.find(x=>x.u===u&&x.p===p&&x.active);
    if(!found){showToast("Wrong username or password!","err");return;}
    setUser(found);sessionRef.current={start:Date.now(),pages:[]};
    const newAn=await S.mergeAnalytics(an=>{
      an.logins=[...(an.logins||[]),{user:u,date:new Date().toISOString().slice(0,10),ts:Date.now(),device:DEVICE_ID}];
      an.activities=[...(an.activities||[]),{type:"login",detail:u,user:u,date:new Date().toLocaleString(),ts:Date.now(),device:DEVICE_ID}];
      return an;
    });
    setData(p=>({...p,analytics:newAn}));setPage("home");showToast("Welcome, "+(found.display||u)+"! 🎉");
  };

  const doLogout=async()=>{
    if(user){const dur=Math.round((Date.now()-sessionRef.current.start)/1000);
    const newAn=await S.mergeAnalytics(an=>{an.sessions=[...(an.sessions||[]),{user:user.u,role:user.role,dur,pages:sessionRef.current.pages.length,flow:[...sessionRef.current.pages],ts:Date.now(),device:DEVICE_ID,loginTime:loginTimeRef.current,logoutTime:new Date().toLocaleString(),timeSpent:dur+"s"}];return an;});
    setData(p=>({...p,analytics:newAn}));}
    setUser(null);setPage("home");setLoginForm({u:"",p:""});setMenuOpen(false);
  };

  const changePassword = async () => {
    if (pwForm.old !== user.p) { showToast("Current password incorrect!","err"); return; }
    if (pwForm.new1.length < 4) { showToast("New password must be 4+ characters!","err"); return; }
    if (pwForm.new1 !== pwForm.new2) { showToast("Passwords don't match!","err"); return; }
    const users = data.users.map(u => u.u === user.u ? {...u, p: pwForm.new1} : u);
    await saveKey("users", users);
    const pwHist = [...(data.passwordHistory||[]), {user:user.u,display:user.display||user.u,role:user.role,oldPw:"***",newPw:"***",changedBy:user.u,date:new Date().toLocaleString(),ts:Date.now()}];
    await saveKey("passwordHistory", pwHist);
    setUser({...user, p: pwForm.new1});
    setShowPwModal(false);
    setPwForm({old:"",new1:"",new2:""});
    showToast("Password changed! 🔐");
  };

  const goTo=(pg)=>{setPage(pg);sessionRef.current.pages.push(pg);track("pageView",pg);setMenuOpen(false);};

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0faf0",fontFamily:"'Nunito',sans-serif"}}><div style={{textAlign:"center"}}><div style={{fontSize:64,marginBottom:12,animation:"bounce 1s infinite"}}>🍃</div><div style={{fontSize:20,fontWeight:700,color:"#1b7a1b"}}>Loading MinTos Club...</div></div></div>;

  if(!user) return <LoginScreen loginForm={loginForm} setLoginForm={setLoginForm} doLogin={doLogin} toast={toast} />;

  const navPages=[
    {id:"home",icon:"🏠",label:"Home",roles:["kid","parent","admin"]},
    {id:"team",icon:"👥",label:"Team",roles:["kid","parent","admin"]},
    {id:"bragboard",icon:"🤩",label:"Jar of JOYs",roles:["kid","parent","admin"]},
    {id:"agenda",icon:"📋",label:"Agenda",roles:["kid","parent","admin"]},
    {id:"meetings",icon:"📅",label:"Meetings",roles:["kid","parent","admin"]},
    {id:"reviews",icon:"⭐",label:"Reviews",roles:["kid","parent","admin"]},
    {id:"walloffame",icon:"🏆",label:"Wall of Fame",roles:["kid","parent","admin"]},
    {id:"appreciation",icon:"🌟",label:"Stars",roles:["kid","parent","admin"]},
    {id:"studio",icon:"🎤",label:"Studio",roles:["admin"]},
    {id:"feedback",icon:"💬",label:"Feedback",roles:["admin"]},
    {id:"resources",icon:"📚",label:"Resources",roles:["kid","parent","admin"]},
    {id:"admin",icon:"⚙️",label:"Admin",roles:["admin"]},
    {id:"analytics",icon:"📊",label:"Analytics",roles:["admin"]},
  ].filter(p=>p.roles.includes(user.role));

  return (

      <nav style={{background:"#fff",borderBottom:"3px solid #6fcf6f",padding:"0 12px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(0,0,0,.05)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:24}}>🍃</span>
          <span style={{fontWeight:900,fontSize:18,color:"#1b7a1b"}}>MinTos</span>
        </div>
        <div className="desktop-nav" style={{display:"flex",gap:1,flexWrap:"wrap",justifyContent:"center",flex:1,margin:"0 8px",overflow:"hidden"}}>
          {navPages.map(p=><button key={p.id} onClick={()=>goTo(p.id)} style={{padding:"5px 8px",borderRadius:8,fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit",background:page===p.id?"#3da33d":"transparent",color:page===p.id?"#fff":"#6b7280",transition:".15s",whiteSpace:"nowrap"}}>{p.icon} {p.label}</button>)}
        </div>
        <button className="mobile-menu-btn" onClick={()=>setMenuOpen(!menuOpen)} style={{display:"none",background:"none",border:"none",fontSize:24,cursor:"pointer",padding:4}}>
          {menuOpen?"✕":"☰"}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span onClick={()=>setShowPwModal(!showPwModal)} title="Click to change password" style={{background:user.role==="admin"?"#fce7f3":user.role==="parent"?"#fef3c7":"#e9f7e9",padding:"3px 8px",borderRadius:12,fontSize:10,fontWeight:700,color:user.role==="admin"?"#be185d":user.role==="parent"?"#92400e":"#1b7a1b",cursor:"pointer"}}>{user.emoji||"👤"} {user.display||user.u}</span>
          <button onClick={doLogout} style={{background:"none",border:"2px solid #ef4444",color:"#ef4444",padding:"3px 8px",borderRadius:8,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Logout</button>

      {menuOpen && <div style={{position:"fixed",top:52,left:0,right:0,background:"#fff",zIndex:99,boxShadow:"0 4px 16px rgba(0,0,0,.1)",padding:8,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        {navPages.map(p=><button key={p.id} onClick={()=>goTo(p.id)} style={{padding:10,borderRadius:10,fontSize:12,fontWeight:700,border:page===p.id?"2px solid #3da33d":"2px solid #e5e7eb",cursor:"pointer",fontFamily:"inherit",background:page===p.id?"#e9f7e9":"#fff",color:page===p.id?"#1b7a1b":"#6b7280",textAlign:"center"}}>{p.icon}<br/>{p.label}</button>)}

      <div style={{maxWidth:1200,margin:"0 auto",padding:"12px 10px"}}>
        {page==="home" && <HomePage user={user} data={data} />}
        {page==="team" && <TeamPage members={data.members} photos={data.photos} data={data} saveKey={saveKey} showToast={showToast} user={user} />}

      </div>

      {toast && <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",padding:"11px 22px",borderRadius:12,fontSize:13,fontWeight:600,zIndex:9999,color:"#fff",boxShadow:"0 4px 16px rgba(0,0,0,.2)",background:toast.type==="err"?"#b91c1c":toast.type==="info"?"#1d4ed8":"#1b7a1b",animation:"fadeIn .3s ease",maxWidth:"90vw",textAlign:"center"}}>{toast.msg}</div>}

        @keyframes fadeIn{from{opacity:0;transform:translateY(12px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}

// ===== TEAM PAGE =====
function TeamPage({members, photos, data, saveKey, showToast, user}) {
  const isAdmin = user && user.role === "admin";
  const [uploading, setUploading] = useState(null);
  const allPhotos = photos || (data && data.photos) || {};

  const handlePhotoDrop = (name, e) => {
    e.preventDefault(); e.stopPropagation();
    const files = e.dataTransfer ? e.dataTransfer.files : e.target.files;
    if (!files || !files[0]) return;
    const file = files[0];
    if (!file.type.startsWith("image/")) { showToast && showToast("Please upload an image file!","err"); return; }
    if (file.size > 2*1024*1024) { showToast && showToast("Image too large! Max 2MB","err"); return; }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const newPhotos = {...allPhotos, [name]: ev.target.result};
      if (saveKey) await saveKey("photos", newPhotos);
      if (showToast) showToast(name+"'s photo updated! 📸");
      setUploading(null);
    };
    reader.readAsDataURL(file);
  };

  return (<div style={{animation:"fadeIn .4s"}}><h1 style={{fontWeight:900,fontSize:26,color:"#1b7a1b",marginBottom:8}}>👫 The Team!!</h1>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
      {members.map(m => <div key={m.name}
        onDragOver={isAdmin?e=>{e.preventDefault();e.stopPropagation();setUploading(m.name);}:undefined}
        onDragLeave={isAdmin?()=>setUploading(null):undefined}
        onDrop={isAdmin?e=>handlePhotoDrop(m.name,e):undefined}
        style={{background:uploading===m.name?"#d1fae5":"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 12px rgba(30,120,30,.08)",display:"flex",alignItems:"center",gap:12,border:uploading===m.name?"2px dashed #3da33d":"2px solid transparent",transition:".2s",position:"relative"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:m.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:allPhotos[m.name]?0:22,color:"#fff",fontWeight:800,flexShrink:0,overflow:"hidden",position:"relative"}}>
          {allPhotos[m.name] ? <img src={allPhotos[m.name]} alt={m.name} style={{width:"100%",height:"100%",objectFit:"cover"}} /> : m.emoji}
          {isAdmin && <label style={{position:"absolute",bottom:-2,right:-2,width:20,height:20,borderRadius:"50%",background:"#3da33d",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}>
            📷<input type="file" accept="image/*" onChange={e=>handlePhotoDrop(m.name,e)} style={{display:"none"}} />
          </label>}
        </div>
        <div><h4 style={{fontWeight:900,fontSize:15}}>{m.name}</h4><p style={{fontSize:11,color:"#6b7280"}}>{m.bio}</p></div>
      </div>)}
    </div>
  </div>);
}

// ===== STUDIO PAGE =====
function StudioPage({data,saveKey,user,showToast,track}) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const recorderRef = useRef(null);
  const chunksRef = useRef([]);
  const [camOn, setCamOn] = useState(false);
  const [recording, setRecording] = useState(null);
  const [form, setForm] = useState({speaker:"",title:"",task:""});
  const [fbRec, setFbRec] = useState(null);

  const startCam = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
      streamRef.current = s;
      if (videoRef.current) videoRef.current.srcObject = s;
      setCamOn(true); showToast("Camera ready! 📷");
    } catch { showToast("Camera access denied","err"); }
  };

  const startRec = (type) => {
    const stream = type==="video" ? streamRef.current : null;
    chunksRef.current = [];
    if (type==="video" && !stream) { showToast("Start camera first!","err"); return; }
    (async () => {
      const s = type==="audio" ? await navigator.mediaDevices.getUserMedia({audio:true}) : stream;
      const mimeTypes = type==="video" ? ["video/webm;codecs=vp9,opus","video/webm","video/mp4"] : ["audio/webm;codecs=opus","audio/webm","audio/ogg"];
      const mime = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || "";
      const mr = new MediaRecorder(s, {mimeType:mime});
      mr.ondataavailable = e => { if(e.data.size>0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        if (type==="audio") s.getTracks().forEach(t=>t.stop());
        const blob = new Blob(chunksRef.current, {type:type==="video"?"video/webm":"audio/webm"});
        const reader = new FileReader();
        reader.onload = async () => {
          const recs = [...data.recordings];
          const rec = {id:Date.now().toString(36)+Math.random().toString(36).substr(2,4),type,title:form.title||(type==="video"?"Video Speech":"Audio Speech"),speaker:form.speaker||"Untagged",task:form.task||"",date:new Date().toLocaleString(),ts:Date.now(),data:reader.result,feedback:genFB(form.speaker,form.title,type,form.task)};
          recs.unshift(rec);
          const metaRecs = recs.map(r => ({...r, data: r.data ? r.data.slice(0,100)+"__BLOB__" : ""}));
          await saveKey("recordings", metaRecs);
          try { localStorage.setItem("mts_blob_"+rec.id, rec.data); } catch {}
          track("recording",(form.speaker||"untagged")+" - "+(form.title||type));
          showToast("Recording saved! 🎉");
          setForm({...form,title:""});
        };
        reader.readAsDataURL(blob);
        setRecording(null);
      };
      recorderRef.current = mr;
      mr.start();
      setRecording(type);
      showToast("Recording "+type+"... 🔴");
    })();
  };

  const stopRec = () => { if(recorderRef.current && recorderRef.current.state!=="inactive") recorderRef.current.stop(); };

  const playRec = (rec) => {
    const blobData = localStorage.getItem("mts_blob_"+rec.id);
    if (!blobData) { showToast("Recording data not available on this device","info"); return; }
    setFbRec({...rec, data: blobData});
  };

  return (<div style={{animation:"fadeIn .4s"}}>
    <h1 style={{fontWeight:900,fontSize:26,color:"#1b7a1b",marginBottom:4}}>🎙️ Recording Studio</h1>
    <p style={{fontSize:13,color:"#6b7280",marginBottom:16}}>Record speeches and get fun feedback from Mr. MinTo! 🍃</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
      <div>
        <Card title="📹 Video">
          <div style={{width:"100%",aspectRatio:"4/3",background:"#111827",borderRadius:12,overflow:"hidden",marginBottom:12,position:"relative"}}>
            <video ref={videoRef} autoPlay muted playsInline style={{width:"100%",height:"100%",objectFit:"cover"}} />
            {!camOn && <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,.4)",fontSize:13}}><span style={{fontSize:40,marginBottom:6}}>📹</span>Click Start Camera</div>}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
            {!camOn && <Btn onClick={startCam}>📷 Start Camera</Btn>}
            {camOn && recording!=="video" && <Btn onClick={()=>startRec("video")} color="linear-gradient(135deg,#ef4444,#b91c1c)">⏺️ Record</Btn>}
            {recording==="video" && <Btn onClick={stopRec} color="#374151">⏹️ Stop</Btn>}
          </div>
        </Card>
        <Card title="🎤 Audio">
          <div style={{width:"100%",height:60,background:"#111827",borderRadius:12,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,.3)",fontSize:recording==="audio"?20:13}}>{recording==="audio"?"🔴 Recording...":"Click Record Audio"}</div>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            {recording!=="audio" && <Btn onClick={()=>startRec("audio")} color="linear-gradient(135deg,#ef4444,#b91c1c)">⏺️ Record Audio</Btn>}
            {recording==="audio" && <Btn onClick={stopRec} color="#374151">⏹️ Stop</Btn>}
          </div>
        </Card>
        <div style={{marginTop:12}}>
          <Sel value={form.speaker} onChange={e=>setForm({...form,speaker:e.target.value})}><option value="">-- Tag Speaker --</option>{data.members.map(m=><option key={m.name} value={m.name}>{m.emoji} {m.name}</option>)}</Sel>
          <Inp value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Title your recording..." />
          <Sel value={form.task} onChange={e=>setForm({...form,task:e.target.value})}><option value="">-- Task/Role --</option>{data.tasks.map(t=><option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}</Sel>
        </div>
      </div>
      <div>
        <Card title="📂 Recordings">
          {data.recordings.length===0 && <p style={{color:"#bbb",textAlign:"center",padding:14}}>No recordings yet! 🎙️</p>}
          {data.recordings.slice(0,20).map(r => <div key={r.id} style={{background:"#fff",borderRadius:10,padding:12,marginBottom:8,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
            <div style={{width:38,height:38,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,background:r.type==="video"?"#dbeafe":"#fef3c7",flexShrink:0}}>{r.type==="video"?"📹":"🎤"}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{r.title}</div><div style={{fontSize:10,color:"#999"}}>👤 {r.speaker} · {r.date}</div></div>
            <div style={{display:"flex",gap:4}}>
              <Btn onClick={()=>playRec(r)} color="#3b82f6" style={{padding:"5px 10px",fontSize:11}}>▶️</Btn>
              <Btn onClick={()=>setFbRec(r)} color="#3da33d" style={{padding:"5px 10px",fontSize:11}}>🍃</Btn>
            </div>
          </div>)}
        </Card>
        {fbRec && fbRec.feedback && <Card title="🍃 Mr. MinTo's Feedback" bg="linear-gradient(135deg,#e9f7e9,#f0faf0)" border="#6fcf6f">
          <div style={{fontSize:15,fontWeight:700,color:"#1b7a1b",marginBottom:10}}>{fbRec.feedback.enc}</div>
          {["voice","gesture","structure"].map(k => <div key={k} style={{background:"#fff",borderRadius:9,padding:10,marginBottom:7,borderLeft:"4px solid #3da33d"}}>
            <div style={{fontSize:10,fontWeight:800,color:"#1d4ed8",textTransform:"uppercase",letterSpacing:.5}}>{fbRec.feedback[k].cat}</div>
            <div style={{fontSize:12,marginTop:2}}>{fbRec.feedback[k].comp}</div>
            <div style={{fontSize:11,color:"#1b7a1b",marginTop:4,fontWeight:600,fontStyle:"italic"}}>💡 {fbRec.feedback[k].tip}</div>
          </div>)}
          {fbRec.data && !fbRec.data.includes("__BLOB__") && <div style={{marginTop:10}}>
            {fbRec.type==="video" ? <video controls style={{width:"100%",borderRadius:10}} src={fbRec.data} /> : <audio controls style={{width:"100%"}} src={fbRec.data} />}
          </div>}
          <Btn onClick={()=>setFbRec(null)} style={{marginTop:8}}>Close</Btn>
        </Card>}
      </div>
    </div>
  </div>);
}

// =====================================================================
// REVIEWS PAGE
// ---------------------------------------------------------------------
// Rules:
//   - Only PARENTS and ADMIN can submit reviews.
//   - Parents can review ANY kid (not just their linked kids).
//   - Parents see:
//       (a) every review THEY submitted (for any kid), AND
//       (b) every review their linked kids received (from anyone).
//   - Kids see all reviews they received, with the submitter's identity
//     fully anonymized ("A Reviewer 👀"). The submitted feedback and
//     ratings are visible; only "who wrote it" is hidden.
//   - Admin sees everything and can edit/delete any review.
// =====================================================================
function ReviewsPage({data,saveKey,user,showToast,track}) {
  const [form, setForm] = useState({kid:"",recId:"",feedback:"",appreciation:"",ratings:{},task:""});
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({feedback:"",appreciation:"",ratings:{},task:""});
  const isAdmin = user.role === "admin";
  const isParent = user.role === "parent";
  const isKid = user.role === "kid";
  const tasks = data.tasks || DEF_TASKS;

  const myLinkedKids = linkedKidsOf(user);

  // Parents and admin can review ANY kid in the club
  const canSubmit = isAdmin || isParent;
  const reviewableMembers = canSubmit ? data.members : [];

  const setStars = (rubricId, val) => setForm({...form, ratings:{...form.ratings, [rubricId]:val}});
  const setEditStars = (rubricId, val) => setEditForm({...editForm, ratings:{...editForm.ratings, [rubricId]:val}});

  const selectedTask = form.task ? tasks.find(t=>t.id===form.task) : null;
  const allRubrics = selectedTask ? selectedTask.rubrics : (tasks.find(t=>t.id==="speakto")?.rubrics || []);

  const submit = async () => {
    if (!canSubmit) { showToast("Only parents and admin can submit reviews!","err"); return; }
    if (!form.kid) { showToast("Select a child!","err"); return; }
    if (!form.feedback && !form.appreciation) { showToast("Write feedback or appreciation!","err"); return; }
    const avgVals = Object.values(form.ratings).filter(v=>v>0);
    const overall = avgVals.length ? Math.round(avgVals.reduce((a,b)=>a+b,0)/avgVals.length*10)/10 : 0;
    const reviews = [...data.reviews];
    reviews.unshift({
      id: Date.now().toString(36)+Math.random().toString(36).substr(2,4),
      kid: form.kid,
      recId: form.recId||null,
      task: form.task||"",
      ratings: {...form.ratings},
      overall,
      feedback: form.feedback,
      appreciation: form.appreciation,
      by: user.display||user.u,
      byUser: user.u,
      role: user.role,
      date: new Date().toLocaleString(),
      ts: Date.now(),
      visible: true
    });
    await saveKey("reviews", reviews);
    track("review", form.kid+" by "+(user.display||user.u));
    setForm({kid:"",recId:"",feedback:"",appreciation:"",ratings:{},task:""});
    showToast("Review submitted! ⭐");
  };

  // Admin: start editing a review
  const startEdit = (rv) => {
    setEditId(rv.id);
    setEditForm({
      feedback: rv.feedback || "",
      appreciation: rv.appreciation || "",
      ratings: {...(rv.ratings||{})},
      task: rv.task || ""
    });
  };

  // Admin: save edited review
  const saveEdit = async () => {
    const avgVals = Object.values(editForm.ratings).filter(v=>v>0);
    const overall = avgVals.length ? Math.round(avgVals.reduce((a,b)=>a+b,0)/avgVals.length*10)/10 : 0;
    const reviews = data.reviews.map(r => r.id===editId ? {
      ...r,
      feedback: editForm.feedback,
      appreciation: editForm.appreciation,
      ratings: {...editForm.ratings},
      task: editForm.task,
      overall,
      editedBy: user.u,
      editedAt: new Date().toLocaleString()
    } : r);
    await saveKey("reviews", reviews);
    setEditId(null);
    showToast("Review updated! ✏️");
  };

  // Admin: delete a review
  const deleteReview = async (id) => {
    if (!window.confirm("Delete this review permanently?")) return;
    const reviews = data.reviews.filter(r => r.id !== id);
    await saveKey("reviews", reviews);
    showToast("Deleted! 🗑️");
  };

  const kidRecs = data.recordings.filter(r => r.speaker === form.kid);

  // Show the submitter's name based on the VIEWER's role.
  // Kids never see who wrote a review — full anonymity.
  const getReviewBy = (rv) => {
    if (isAdmin) return rv.by + " (" + rv.byUser + ")";
    if (isParent && rv.byUser === user.u) return "You";
    if (isParent) return "A Reviewer 👀";
    if (isKid) return "A Reviewer 👀";
    return "A Reviewer 👀";
  };

  // Visibility filter — the core of the access rules.
  const visibleReviews = data.reviews.filter(rv => {
    if (isAdmin) return true;

    if (isKid) {
      // Kids see all reviews about themselves. Identity is hidden via getReviewBy.
      return rv.kid === user.display;
    }

    if (isParent) {
      // (a) any review I submitted, for any kid
      if (rv.byUser === user.u) return true;
      // (b) any review my linked kids received, from anyone
      if (myLinkedKids.includes(rv.kid)) return true;
      return false;
    }

    return false;
  });

  // Rubrics available for the admin edit form
  const editSelectedTask = editForm.task ? tasks.find(t=>t.id===editForm.task) : null;
  const editRubrics = editSelectedTask ? editSelectedTask.rubrics : (tasks.find(t=>t.id==="speakto")?.rubrics || []);

  return (<div style={{animation:"fadeIn .4s"}}>
    <h1 style={{fontWeight:900,fontSize:26,color:"#1b7a1b",marginBottom:4}}>⭐ {isKid ? "My Reviews" : "Reviews"}</h1>
    <p style={{fontSize:13,color:"#6b7280",marginBottom:16}}>
      {isKid ? "See what your reviewers say about you! Keep growing! 🌟 (Reviewer names are kept private.)"
             : isParent ? "You can review any kid. You'll see every review you submit, and every review your linked kids receive."
             : "Admin view — all reviews, full edit/delete access."}
    </p>

    {/* Submission form — parents + admin only */}
    {canSubmit && <Card title="⭐ Submit a Review" bg="linear-gradient(135deg,#fffbeb,#fef9c3)" border="#fbbf24">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <Sel value={form.kid} onChange={e=>setForm({...form,kid:e.target.value})}>
          <option value="">-- Select Child --</option>
          {reviewableMembers.map(m=><option key={m.name} value={m.name}>{m.emoji} {m.name}</option>)}
        </Sel>
        <Sel value={form.task||""} onChange={e=>setForm({...form,task:e.target.value,ratings:{}})}>
          <option value="">-- Task/Role --</option>
          {tasks.map(t=><option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}
        </Sel>
      </div>
      {form.kid && <Sel value={form.recId||""} onChange={e=>setForm({...form,recId:e.target.value})}>
        <option value="">-- General Review --</option>
        {kidRecs.map(r=><option key={r.id} value={r.id}>{r.title} ({r.date})</option>)}
      </Sel>}

      <div style={{margin:"10px 0"}}>
        <div style={{fontSize:12,fontWeight:800,color:"#92400e",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Measures of Success {selectedTask ? "for "+selectedTask.name : ""}</div>
        {allRubrics.map(rb => <div key={rb.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,.05)"}}>
          <span style={{minWidth:170,fontWeight:700,fontSize:12}}>{rb.icon} {rb.label}</span>
          <div style={{display:"flex",gap:3}}>
            {[1,2,3,4,5].map(s => <button key={s} onClick={()=>setStars(rb.id,s)} style={{fontSize:22,background:"none",border:"none",cursor:"pointer",filter:(form.ratings[rb.id]||0)>=s?"none":"grayscale(1) opacity(.3)",transition:".15s"}}>⭐</button>)}
          </div>
          <span style={{fontSize:10,color:"#6b7280",maxWidth:180}}>{rb.desc}</span>
        </div>)}
      </div>

      <textarea value={form.feedback} onChange={e=>setForm({...form,feedback:e.target.value})} placeholder="Constructive feedback — what did they do well? What can improve?" style={{width:"100%",padding:10,border:"2px solid #fde68a",borderRadius:9,fontFamily:"inherit",fontSize:13,minHeight:60,resize:"vertical",outline:"none",marginBottom:8}} />
      <textarea value={form.appreciation} onChange={e=>setForm({...form,appreciation:e.target.value})} placeholder="Appreciation — share something positive and encouraging..." style={{width:"100%",padding:10,border:"2px solid #fde68a",borderRadius:9,fontFamily:"inherit",fontSize:13,minHeight:60,resize:"vertical",outline:"none",marginBottom:8}} />
      <Btn onClick={submit} color="linear-gradient(135deg,#f59e0b,#d97706)">⭐ Submit Review</Btn>
    </Card>}

    <Card title="📜 Reviews">
      {visibleReviews.length===0 && <p style={{color:"#bbb",textAlign:"center",padding:14}}>No reviews to show yet.</p>}
      {visibleReviews.slice(0,50).map(rv => {
        const stars = "⭐".repeat(Math.round(rv.overall))+"☆".repeat(5-Math.round(rv.overall));
        const taskObj = tasks.find(t=>t.id===rv.task);
        const isEditing = editId === rv.id;
        return <div key={rv.id} style={{background:"#fff",borderRadius:10,padding:12,marginBottom:8,borderLeft:"4px solid #fbbf24"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <strong>{rv.kid}</strong>
            <span style={{color:"#d97706",fontSize:14}}>{stars} ({rv.overall}/5)</span>
          </div>
          <div style={{fontSize:10,color:"#999",marginTop:2}}>
            by {getReviewBy(rv)} · {rv.date} {taskObj ? "· "+taskObj.icon+" "+taskObj.name : ""}
            {rv.editedBy && isAdmin && <span> · edited by {rv.editedBy}</span>}
          </div>

          {!isEditing && <>
            {rv.feedback && <div style={{fontSize:12,marginTop:6,lineHeight:1.5}}><strong>Feedback:</strong> {rv.feedback}</div>}
            {rv.appreciation && <div style={{fontSize:12,marginTop:4,lineHeight:1.5,color:"#1b7a1b"}}><strong>Appreciation:</strong> {rv.appreciation}</div>}
            {rv.ratings && taskObj && <div style={{fontSize:11,color:"#6b7280",marginTop:5}}>
              {taskObj.rubrics.map(rb=>{const v=rv.ratings[rb.id];return v?`${rb.icon} ${rb.label}: ${"⭐".repeat(v)}`:null;}).filter(Boolean).join(" · ")}
            </div>}
          </>}

          {/* Admin edit form */}
          {isAdmin && isEditing && <div style={{marginTop:10,padding:12,background:"#fffbeb",borderRadius:10,border:"2px solid #fbbf24"}}>
            <div style={{fontWeight:800,fontSize:13,color:"#92400e",marginBottom:8}}>✏️ Edit Review</div>
            <Sel value={editForm.task} onChange={e=>setEditForm({...editForm,task:e.target.value})}>
              <option value="">-- Task/Role --</option>
              {tasks.map(t=><option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}
            </Sel>
            <label style={{fontSize:11,fontWeight:700,color:"#888"}}>Feedback:</label>
            <textarea value={editForm.feedback} onChange={e=>setEditForm({...editForm,feedback:e.target.value})} style={{width:"100%",padding:8,border:"2px solid #fde68a",borderRadius:8,fontFamily:"inherit",fontSize:12,minHeight:60,resize:"vertical",outline:"none",marginBottom:6,boxSizing:"border-box"}} />
            <label style={{fontSize:11,fontWeight:700,color:"#888"}}>Appreciation:</label>
            <textarea value={editForm.appreciation} onChange={e=>setEditForm({...editForm,appreciation:e.target.value})} style={{width:"100%",padding:8,border:"2px solid #fde68a",borderRadius:8,fontFamily:"inherit",fontSize:12,minHeight:60,resize:"vertical",outline:"none",marginBottom:6,boxSizing:"border-box"}} />
            <div style={{fontSize:11,fontWeight:800,color:"#92400e",marginBottom:6}}>Star Ratings:</div>
            {editRubrics.map(rb => <div key={rb.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
              <span style={{minWidth:150,fontWeight:700,fontSize:11}}>{rb.icon} {rb.label}</span>
              <div style={{display:"flex",gap:2}}>
                {[1,2,3,4,5].map(s => <button key={s} onClick={()=>setEditStars(rb.id,s)} style={{fontSize:18,background:"none",border:"none",cursor:"pointer",filter:(editForm.ratings[rb.id]||0)>=s?"none":"grayscale(1) opacity(.3)"}}>⭐</button>)}
              </div>
            </div>)}
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <Btn onClick={saveEdit} color="linear-gradient(135deg,#f59e0b,#d97706)" style={{fontSize:11}}>💾 Save</Btn>
              <Btn onClick={()=>setEditId(null)} color="#999" style={{fontSize:11}}>Cancel</Btn>
            </div>
          </div>}

          {/* Admin action buttons */}
          {isAdmin && !isEditing && <div style={{display:"flex",gap:6,marginTop:8}}>
            <Btn onClick={()=>startEdit(rv)} color="#6b7280" style={{padding:"4px 10px",fontSize:10}}>✏️ Edit</Btn>
            <Btn onClick={()=>deleteReview(rv.id)} color="#ef4444" style={{padding:"4px 10px",fontSize:10}}>🗑️ Delete</Btn>
          </div>}
        </div>;
      })}
    </Card>
  </div>);
}

// ===== WALL OF FAME PAGE =====
function WallOfFamePage({data}) {
  const [tab, setTab] = useState("kids");
  const {members,recordings,appreciations,reviews} = data;

  const badges = [
    {e:"🎤",t:"First Speech!",d:"Recorded first speech",ck:n=>recordings.some(r=>r.speaker===n)},
    {e:"📹",t:"Camera Star",d:"Recorded a video",ck:n=>recordings.some(r=>r.speaker===n&&r.type==="video")},
    {e:"🎵",t:"Voice Artist",d:"Audio speech recorded",ck:n=>recordings.some(r=>r.speaker===n&&r.type==="audio")},
    {e:"🌟",t:"Appreciated!",d:"Someone said something nice",ck:n=>appreciations.some(a=>a.who===n)},
    {e:"💬",t:"Kind Words",d:"Appreciated someone",ck:n=>appreciations.some(a=>a.from===n)},
    {e:"🔥",t:"Speech Machine",d:"3+ recordings",ck:n=>recordings.filter(r=>r.speaker===n).length>=3},
    {e:"🏆",t:"Practice Champ",d:"5+ recordings",ck:n=>recordings.filter(r=>r.speaker===n).length>=5},

    <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
      {[{id:"kids",label:"🎮 Kids Board"},{id:"parents",label:"📊 Parents Dashboard"},{id:"bragstats",label:"🌿 Joys in the Jar"}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 18px",borderRadius:10,border:"2px solid "+(tab===t.id?"#3da33d":"#d1fae5"),background:tab===t.id?"#3da33d":"#fff",color:tab===t.id?"#fff":"#6b7280",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer"}}>{t.label}</button>)}
    </div>

    {tab==="kids" && <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
      {badges.map(b => {const earners=members.filter(m=>b.ck(m.name));return <div key={b.t} style={{background:"#fff",borderRadius:14,padding:16,textAlign:"center",boxShadow:"0 2px 12px rgba(30,120,30,.08)"}}>
        <div style={{fontSize:40,marginBottom:4}}>{b.e}</div><h4 style={{fontWeight:900,fontSize:14}}>{b.t}</h4><div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{b.d}</div>
        <div style={{marginTop:8,fontSize:11,fontWeight:700,background:earners.length?"#e9f7e9":"#fef3c7",color:earners.length?"#1b7a1b":"#92400e",padding:"3px 10px",borderRadius:7,display:"inline-block"}}>{earners.length?earners.map(m=>m.emoji+" "+m.name).join(", "):"Keep going! 💪"}</div>
      </div>;})}
    </div>}

    {tab==="parents" && <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:18}}>
        {[{l:"Total Speeches",v:recordings.length},{l:"Videos",v:recordings.filter(r=>r.type==="video").length},{l:"Reviews",v:reviews.length},{l:"Appreciations",v:appreciations.length}].map((m,i)=>
          <div key={i} style={{background:"#fff",borderRadius:14,padding:16,boxShadow:"0 2px 12px rgba(30,120,30,.08)"}}><div style={{fontSize:12,color:"#6b7280",fontWeight:600}}>{m.l}</div><div style={{fontWeight:900,fontSize:28,color:"#1b7a1b"}}>{m.v}</div></div>)}
      </div>
      <Card title="📊 Per-Child Detail">
        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#e9f7e9"}}><th style={{padding:8,textAlign:"left"}}>Child</th><th style={{padding:8}}>Speeches</th><th style={{padding:8}}>Reviews</th><th style={{padding:8}}>Avg ⭐</th></tr></thead>
          <tbody>{members.map(m => {const rs=recordings.filter(r=>r.speaker===m.name);const rv=reviews.filter(r=>r.kid===m.name);const avg=rv.length?Math.round(rv.reduce((a,b)=>a+b.overall,0)/rv.length*10)/10:"-";
            return <tr key={m.name}><td style={{padding:8}}>{m.emoji} {m.name}</td><td style={{padding:8,textAlign:"center"}}>{rs.length}</td><td style={{padding:8,textAlign:"center"}}>{rv.length}</td><td style={{padding:8,textAlign:"center"}}>{avg}</td></tr>;})}</tbody>
        </table></div>
      </Card>
    </div>}

    {tab==="bragstats" && <Card title="😎 Highlights">
      <BragBoardStats bragboard={data.bragboard||[]} members={members} />
    </Card>}
  </div>);
}

function BragBoardStats({bragboard, members}) {
  if (!bragboard || bragboard.length === 0) return <p style={{textAlign:"center",color:"#bbb",padding:20}}>No posts yet!</p>;
  const topBraggers = {};
  bragboard.forEach(b => { topBraggers[b.speaker] = (topBraggers[b.speaker]||0)+1; });
  const sorted = Object.entries(topBraggers).sort((a,b)=>b[1]-a[1]);
  const totalComments = bragboard.reduce((a,b)=>a+(b.comments||[]).length,0);
  const totalEmojis = bragboard.reduce((a,b)=>a+Object.values(b.reactions||{}).reduce((x,y)=>x+y,0),0);
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:12,marginBottom:16}}>
      <div style={{background:"#fef3c7",borderRadius:12,padding:14,textAlign:"center"}}><div style={{fontWeight:900,fontSize:22,color:"#d97706"}}>{bragboard.length}</div><div style={{fontSize:10,color:"#92400e"}}>Total Joys</div></div>

// =====================================================================
// APPRECIATION PAGE
// ---------------------------------------------------------------------
// Rules:
//   - EVERY user (kids, parents, admin) can appreciate EVERY user
//     (including other kids, parents, and admin).
//   - ALL users see ALL appreciations (it's a public celebration board).
//   - Admin can edit or delete any appreciation.
//   - Appreciation target ("who") is stored as a username (u) so that
//     display-name changes don't break the link. We still show the
//     display name in the UI.
// =====================================================================
function AppreciationPage({data,saveKey,user,showToast,track}) {
  const [week, setWeek] = useState(0);
  const [form, setForm] = useState({who:"",text:""});
  const [editId, setEditId] = useState(null);
  const [editText, setEditText] = useState("");
  const isAdmin = user.role === "admin";

  // Only show active users in the dropdown, and let everyone pick everyone
  const targetUsers = (data.users || []).filter(u => u.active);

  // Helper: given a stored "who" value, find the matching user.
  // Accepts either username or display name for backwards compatibility
  // with older appreciations that stored display names.
  const resolveUser = (who) => {
    if (!who) return null;
    return (data.users || []).find(u => u.u === who)
        || (data.users || []).find(u => (u.display||"") === who)
        || null;
  };

  const filtered = (data.appreciations || []).filter(a => a && a.week === week);

  const submit = async () => {
    if (!form.who || !form.text.trim()) { showToast("Pick someone and write something!","err"); return; }
    const targetUser = (data.users||[]).find(u => u.u === form.who);
    const apps = [...(data.appreciations||[]), {
      id: Date.now().toString(36)+Math.random().toString(36).substr(2,4),
      who: form.who,                              // stored as username
      whoDisplay: targetUser?.display || form.who, // snapshot for display
      text: form.text.trim(),
      from: user.display || user.u,
      fromUser: user.u,
      week,
      date: new Date().toLocaleDateString(),
      ts: Date.now()
    }];
    await saveKey("appreciations", apps);
    track("appreciation", form.who);
    setForm({who:"",text:""});
    showToast("Appreciation shared! 🌟");
  };

  // Admin: save an edited appreciation
  const saveEdit = async (id) => {
    if (!editText.trim()) { showToast("Text can't be empty!","err"); return; }
    const apps = (data.appreciations||[]).map(a =>
      a.id === id ? {...a, text: editText.trim(), editedBy: user.u, editedAt: new Date().toLocaleString()} : a
    );
    await saveKey("appreciations", apps);
    setEditId(null); setEditText("");
    showToast("Appreciation updated! ✏️");
  };

  // Admin: delete an appreciation
  const deleteApp = async (id) => {
    if (!window.confirm("Delete this appreciation?")) return;
    const apps = (data.appreciations||[]).filter(a => a.id !== id);
    await saveKey("appreciations", apps);
    showToast("Deleted! 🗑️");
  };

  return (<div style={{animation:"fadeIn .4s"}}>
    <h1 style={{fontWeight:900,fontSize:26,color:"#1b7a1b",marginBottom:4}}>🌟 Appreciation Board</h1>
    <p style={{fontSize:13,color:"#6b7280",marginBottom:14}}>✨ Appreciate anyone for anything! Everyone sees all the love ❤️</p>

    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:16}}>
      {Array.from({length:13},(_,i)=>i).map(w => <button key={w} onClick={()=>setWeek(w)} style={{padding:"6px 12px",borderRadius:8,border:"2px solid "+(week===w?"#fbbf24":"#d1fae5"),background:week===w?"#fbbf24":"#fff",color:week===w?"#333":"#6b7280",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>Wk {w}</button>)}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14,marginBottom:18}}>
      {filtered.length===0 && <p style={{color:"#bbb",gridColumn:"1/-1",textAlign:"center",padding:24}}>No appreciations for Week {week} yet! 🌟</p>}
      {filtered.map((a) => {
        const targetUser = resolveUser(a.who);
        const displayName = a.whoDisplay || targetUser?.display || a.who;
        const emoji = targetUser?.emoji || "⭐";
        const isEditing = editId === a.id;
        return <div key={a.id||a.ts} style={{background:"linear-gradient(135deg,#fffde7,#fef9c3)",border:"2px solid #fbbf24",borderRadius:14,padding:16}}>
          <div style={{fontSize:26}}>{emoji}</div>
          <h4 style={{fontWeight:900,color:"#d97706"}}>{displayName}</h4>
          {!isEditing && <p style={{fontSize:13,color:"#555",marginTop:4,whiteSpace:"pre-wrap"}}>{a.text}</p>}
          {isEditing && <textarea value={editText} onChange={e=>setEditText(e.target.value)} style={{width:"100%",padding:8,border:"2px solid #fbbf24",borderRadius:8,fontFamily:"inherit",fontSize:12,minHeight:60,marginTop:6,resize:"vertical",outline:"none"}} />}
          <p style={{fontSize:10,color:"#aaa",marginTop:6}}>— {a.from}, {a.date}{a.editedBy?" (edited)":""}</p>
          {isAdmin && !isEditing && <div style={{display:"flex",gap:6,marginTop:8}}>
            <Btn onClick={()=>{setEditId(a.id);setEditText(a.text);}} color="#6b7280" style={{padding:"4px 10px",fontSize:10}}>✏️ Edit</Btn>
            <Btn onClick={()=>deleteApp(a.id)} color="#ef4444" style={{padding:"4px 10px",fontSize:10}}>🗑️ Delete</Btn>
          </div>}
          {isAdmin && isEditing && <div style={{display:"flex",gap:6,marginTop:8}}>
            <Btn onClick={()=>saveEdit(a.id)} style={{padding:"4px 10px",fontSize:10}}>💾 Save</Btn>
            <Btn onClick={()=>{setEditId(null);setEditText("");}} color="#999" style={{padding:"4px 10px",fontSize:10}}>Cancel</Btn>
          </div>}
        </div>;
      })}
    </div>

    <Card title="✍️ Add Appreciation">
      <Sel value={form.who} onChange={e=>setForm({...form,who:e.target.value})}>
        <option value="">-- Who do you want to appreciate? --</option>
        {targetUsers.map(u => <option key={u.u} value={u.u}>{u.emoji||"👤"} {u.display||u.u} ({u.role})</option>)}
      </Sel>
      <textarea value={form.text} onChange={e=>setForm({...form,text:e.target.value})} placeholder="🤗 Appreciate someone with all your heart 💖" style={{width:"100%",padding:10,border:"2px solid #d1fae5",borderRadius:9,fontFamily:"inherit",fontSize:13,minHeight:60,resize:"vertical",outline:"none",marginBottom:8}} />
      <Btn onClick={submit}>🌟 Share</Btn>
    </Card>
  </div>);
}

// =====================================================================
// ADMIN PAGE — Updated to always store linkedKid as an ARRAY
// =====================================================================
function AdminPage({data,saveKey,showToast,user}) {
  const [editKey, setEditKey] = useState("members");
  const [editJson, setEditJson] = useState("");
  const [newUser, setNewUser] = useState({u:"",p:"",role:"kid",linkedKid:[],email:"",phone:"",name: ""});
  const [pwEditUser, setPwEditUser] = useState("");
  const [pwEditVal, setPwEditVal] = useState("");

  useEffect(() => { setEditJson(JSON.stringify(data[editKey]||[], null, 2)); }, [editKey, data]);

  const addUser = async () => {
    if (!newUser.u||!newUser.p) { showToast("Username & password needed!","err"); return; }
    const users = [...data.users];
    if (users.find(x=>x.u===newUser.u.toLowerCase())) { showToast("Exists!","err"); return; }
    const u = newUser.u.toLowerCase();
    const colors=["#EF5350","#42A5F5","#AB47BC","#FF7043","#26A69A","#FFA726","#8D6E63"];
    const emojis=["🌟","🎯","🎪","🎨","🌈","🎸","🎺"];

    // Display name logic: parent gets "<kids>'s Parent", others use name or username
    const displayName = newUser.role === "parent" && newUser.linkedKid?.length
      ? newUser.linkedKid.join(" & ") + "'s Parent"
      : (newUser.name || u.charAt(0).toUpperCase() + u.slice(1));

    const nu = {
      u, p: newUser.p, role: newUser.role, active: true,
      color: colors[users.length % 7], emoji: emojis[users.length % 7],
      display: displayName
    };

    // ALWAYS store linkedKid as an array (even if single kid) for consistency
    if (newUser.role === "parent" && newUser.linkedKid?.length) {
      nu.linkedKid = [...newUser.linkedKid];
    }
    if (newUser.email) nu.email = newUser.email;
    if (newUser.phone) nu.phone = newUser.phone;

    users.push(nu);
    await saveKey("users", users);

    if (newUser.role==="kid") {
      const m=[...data.members];
      if(!m.find(x=>x.name.toLowerCase()===u)){
        m.push({name:nu.display,color:nu.color,emoji:nu.emoji,bio:"New member!"});
        await saveKey("members",m);
      }
    }
    setNewUser({u:"",p:"",role:"kid",linkedKid:[],email:"",phone:"",name:""});
    showToast("User added! ✅");
  };

  const toggleActive = async (i) => { const u=[...data.users];u[i].active=!u[i].active;await saveKey("users",u); };
  const removeUser = async (i) => { if(!window.confirm("Remove?"))return;const u=[...data.users];u.splice(i,1);await saveKey("users",u); };
  const saveJson = async () => { try{const d=JSON.parse(editJson);await saveKey(editKey,d);showToast("Saved! ✅");}catch{showToast("Invalid JSON!","err");} };

  const adminResetPw = async () => {
    if (!pwEditUser || pwEditVal.length<4) { showToast("Select user & enter 4+ char password!","err"); return; }
    const users = data.users.map(u=>u.u===pwEditUser?{...u,p:pwEditVal}:u);
    await saveKey("users",users);
    const pwHist = [...(data.passwordHistory||[]),{user:pwEditUser,display:(data.users.find(u=>u.u===pwEditUser)||{}).display||pwEditUser,role:(data.users.find(u=>u.u===pwEditUser)||{}).role||"?",oldPw:"***",newPw:"***",changedBy:user.u+" (admin)",date:new Date().toLocaleString(),ts:Date.now()}];
    await saveKey("passwordHistory",pwHist);
    setPwEditUser("");setPwEditVal("");
    showToast("Password reset! 🔐");
  };

  const dataKeys = ["members","tasks","agenda","resources","appreciations","recordings","reviews","config","analytics","passwordHistory","bragboard","users"];

  return (<div style={{animation:"fadeIn .4s"}}>
    <h1 style={{fontWeight:900,fontSize:26,color:"#1b7a1b",marginBottom:16}}>⚙️ Admin Panel</h1>

    <Card title="👥 User Management">
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <thead><tr style={{background:"#e9f7e9"}}><th style={{padding:6,textAlign:"left"}}>User</th><th style={{padding:6}}>Role</th><th style={{padding:6}}>Linked Kids</th><th style={{padding:6}}>Active</th><th style={{padding:6}}>Actions</th></tr></thead>
        <tbody>{data.users.map((u,i) => <tr key={u.u} style={{borderBottom:"1px solid #f0f0f0"}}>
          <td style={{padding:6}}>{u.emoji} {u.display||u.u}</td>
          <td style={{padding:6,textAlign:"center"}}><span style={{background:u.role==="admin"?"#ec4899":u.role==="parent"?"#fbbf24":"#3b82f6",color:"#fff",padding:"2px 8px",borderRadius:7,fontSize:10}}>{u.role}</span></td>
          <td style={{padding:6,textAlign:"center",fontSize:10}}>{linkedKidsOf(u).join(", ")||"-"}</td>
          <td style={{padding:6,textAlign:"center"}}><button onClick={()=>toggleActive(i)} style={{width:36,height:20,borderRadius:10,border:"none",cursor:"pointer",background:u.active?"#3da33d":"#ccc",position:"relative"}}><span style={{position:"absolute",width:16,height:16,borderRadius:"50%",background:"#fff",top:2,left:u.active?18:2,transition:".2s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}} /></button></td>
          <td style={{padding:6,textAlign:"center"}}>{u.u!=="admin"&&<Btn onClick={()=>removeUser(i)} color="#ef4444" style={{padding:"3px 8px",fontSize:9}}>Remove</Btn>}</td>
        </tr>)}</tbody>
      </table></div>

      <div style={{marginTop:14,padding:12,background:"#fafff5",borderRadius:10}}>
        <div style={{fontWeight:700,fontSize:12,color:"#1b7a1b",marginBottom:8}}>➕ Add New User</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <Inp value={newUser.name || ""} onChange={e=>setNewUser({...newUser,name:e.target.value})} placeholder="Name" style={{width:120}} />
          <Inp value={newUser.u} onChange={e=>setNewUser({...newUser,u:e.target.value})} placeholder="Username" style={{width:110}} />
          <Inp value={newUser.p} onChange={e=>setNewUser({...newUser,p:e.target.value})} placeholder="Password" style={{width:110}} />
          <Sel value={newUser.role} onChange={e=>setNewUser({...newUser,role:e.target.value, linkedKid: []})} style={{width:100}}>
            <option value="kid">Kid</option>
            <option value="parent">Parent</option>
            <option value="admin">Admin</option>
          </Sel>
          {newUser.role==="parent" && (
            <Sel multiple value={newUser.linkedKid || []}
              onChange={e=>{
                const selected = Array.from(e.target.selectedOptions, option => option.value);
                setNewUser({...newUser, linkedKid: selected});
              }}
              style={{width:180,height:100}}>
              {data.users.filter(u => u.role === "kid").map(u => (
                <option key={u.u} value={u.display || u.u}>{u.display || u.u}</option>
              ))}
            </Sel>
          )}
          <Inp value={newUser.email||""} onChange={e=>setNewUser({...newUser,email:e.target.value})} placeholder="Email (optional)" style={{width:150}} />
          <Btn onClick={addUser}>Add User</Btn>
        </div>
        {newUser.role==="parent" && <p style={{fontSize:10,color:"#6b7280",marginTop:6}}>💡 Hold Ctrl/Cmd to select multiple kids</p>}
      </div>
    </Card>

    <Card title="🔐 Password Management" bg="linear-gradient(135deg,#fff7ed,#fef3c7)" border="#f59e0b">
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:14}}>
        <Sel value={pwEditUser} onChange={e=>setPwEditUser(e.target.value)} style={{width:180}}><option value="">-- Select User --</option>{data.users.map(u=><option key={u.u} value={u.u}>{u.emoji} {u.display||u.u} ({u.role})</option>)}</Sel>
        <Inp value={pwEditVal} onChange={e=>setPwEditVal(e.target.value)} placeholder="New password (4+ chars)" style={{width:180}} type="password" />
        <Btn onClick={adminResetPw} color="linear-gradient(135deg,#f59e0b,#d97706)">🔐 Reset</Btn>
      </div>
    </Card>

    <Card title="📝 Edit All Data (JSON)">
      <Sel value={editKey} onChange={e=>setEditKey(e.target.value)}>{dataKeys.map(k=><option key={k} value={k}>{k}</option>)}</Sel>
      <textarea value={editJson} onChange={e=>setEditJson(e.target.value)} style={{width:"100%",minHeight:220,padding:12,border:"2px solid #e5e7eb",borderRadius:10,fontFamily:"'Courier New',monospace",fontSize:11,resize:"vertical",outline:"none",marginBottom:8}} />
      <div style={{display:"flex",gap:8}}><Btn onClick={saveJson}>💾 Save</Btn><Btn onClick={()=>setEditJson(JSON.stringify(data[editKey]||[],null,2))} color="#6b7280">↩️ Reset</Btn></div>
    </Card>

    <Card title="🗑️ Data Management">
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn onClick={async()=>{if(!window.confirm("Reset ALL data?"))return;for(const k of dataKeys){await S.del("mts_"+k);}window.location.reload();}} color="#ef4444">Reset All Data</Btn>
        <Btn onClick={()=>{const d={};dataKeys.forEach(k=>d[k]=data[k]);const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:"application/json"}));a.download="mintos_backup.json";a.click();showToast("Exported!");}} color="#3b82f6">📥 Export All</Btn>
      </div>
    </Card>
  </div>);
}
